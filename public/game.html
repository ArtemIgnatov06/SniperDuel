<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Duel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="game-page">
    <canvas id="game-canvas"></canvas>
    <div id="overlay" class="overlay hidden">
        <p id="overlay-text"></p>
        <button class="pixel-btn" id="new-game-btn" style="display:none;">NEW GAME</button>
    </div>
    <div id="settings-overlay" class="settings-overlay hidden">
        <div class="settings-panel">
            <div class="settings-title">SETTINGS</div>
            <div class="settings-section-title">KEY BINDINGS</div>
            <div id="bindings-grid" class="bindings-grid"></div>
            <div class="settings-buttons">
                <button class="pixel-btn small" id="reset-bindings-btn">RESET DEFAULTS</button>
                <button class="pixel-btn small" id="close-settings-btn">CLOSE</button>
            </div>
            <div class="settings-hint">ESC TO CLOSE</div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/network.js"></script>
    <script src="/js/input.js"></script>
    <script src="/js/renderer.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
